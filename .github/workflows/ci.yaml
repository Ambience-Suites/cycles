# Note CI is disabled by default in forked repositories. To enable, go to
# repository Settings > Secrets and add secret CI_ENABLE with value 1.
#
# These actions require downloading large precompiled libraries, which will
# take up significant cache space.

name: CI

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - 'web/**'
  pull_request:
    paths-ignore:
      - 'web/**'
  schedule:
    - cron: "45 3 */6 * *"
  workflow_dispatch:

jobs:
  Setup:
    runs-on: ubuntu-latest
    outputs:
      CI_ENABLE: ${{ steps.check_secret.outputs.CI_ENABLE }}
    steps:
      - name: Check Secret
        id: check_secret
        env:
          CI_ENABLE: ${{ secrets.CI_ENABLE }}
        run: echo "CI_ENABLE=${{ env.CI_ENABLE != '' }}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Python lint, serial-box validation, and TV/EV unit tests
  # (runs on every push/PR without the CI_ENABLE gate — lightweight, no libs)
  # ---------------------------------------------------------------------------
  Python-Checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml pyflakes

      - name: Lint Python sources (pyflakes)
        run: |
          pyflakes ambience_suites/ tools/serial_boxes/ tools/tvev/ \
                   render_config.py src/cmake/make_format.py

      - name: Validate render_config.py is importable
        run: python render_config.py

      - name: Run TV/EV unit tests
        run: python -m pytest tools/tvev/test_scorer.py -v

      - name: Generate serial boxes (smoke test)
        run: |
          python -m tools.serial_boxes.generator \
            --animations-dir ./animations \
            --render-config ./render_config.py \
            --output-dir /tmp/serial_boxes_ci

      - name: Validate generated serial boxes
        run: |
          python -m tools.serial_boxes.validator \
            --boxes-dir /tmp/serial_boxes_ci \
            --strict

  # ---------------------------------------------------------------------------
  # C++ build and test matrix
  # ---------------------------------------------------------------------------
  Build:
    needs: [Setup]
    if: needs.Setup.outputs.CI_ENABLE == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [Linux, macOS, Windows]
        include:
          - platform: Linux
            os: ubuntu-latest
            make: make
          - platform: macOS
            os: macos-latest
            make: make
          - platform: Windows
            os: windows-latest
            make: cmd /c make.bat
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: cycles

      - name: Restore Libraries
        uses: actions/cache/restore@v4
        with:
          path: cycles/.git/modules/lib
          key: libs-${{ matrix.os }}

      - name: Update
        working-directory: cycles
        run: ${{ matrix.make }} update

      - name: Cache Libraries
        uses: actions/cache/save@v4
        if: always()
        with:
          path: cycles/.git/modules/lib
          key: libs-${{ matrix.os }}-${{ github.ref }}

      - name: Build
        working-directory: cycles
        run: ${{ matrix.make }}

      - name: Test
        working-directory: cycles
        run: ${{ matrix.make }} test

